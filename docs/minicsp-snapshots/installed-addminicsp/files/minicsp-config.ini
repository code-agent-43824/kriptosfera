[OID]
# Идентификаторы алгоритмов. Описание идентификатора должно содержать поля:
# "Name"= имя идентификатора
# "Algid"= номер идентификатора (ALG_ID) (опционально)
# "ExtraInfo"= бинарный блок доп. информации (опционально)
# "Flags"= отсутствует или 0 - запись регистрируется после стандартных,
# 1 - перед ними (опционально)
# "Lang"= язык имени идентификатора (опционально). В CryptFindOIDInfo и
# CryptEnumOIDInfo влияет на выбор записей в зависимости от системного языка.
# Возможные значения: "ru", "en". Умолчание: запись подходит для любого языка.
# Пример (!4 - dwGroupId, !a/!b - уникальный идентификатор в рамках одного OID):
# [OID\"1.2.643.2.2.4!4!a"]
# "Name"="ГОСТ Р 34.11/34.10-94"
# "Algid"=32798
# "ExtraInfo"=hex:1e,2e,00,00,04,00,00,00,47,00,00,00
# "Lang"="ru"
# [OID\"1.2.643.2.2.4!4!b"]
# "Name"="GOST R 34.11/34.10-94"
# "Algid"=32798
# "ExtraInfo"=hex:1e,2e,00,00,04,00,00,00,47,00,00,00
# "Lang"="en"

