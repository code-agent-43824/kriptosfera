name: build-windows

env:
  GOTOOLCHAIN: local

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-2025-vs2026
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 1

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.24'
          cache: true
          cache-dependency-path: go.mod

      - name: Restore Chromium runtime cache
        uses: actions/cache@v5
        with:
          path: .build-cache/chromium
          key: chromium-win64-${{ hashFiles('build/chromium-runtime.json') }}

      - name: Build demo executable
        shell: pwsh
        run: |
          ./build/build-windows.ps1 -PayloadMode embedded
          ./build/build-windows.ps1 -PayloadMode remote

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v6
        with:
          name: kriptosfera-windows-build
          path: |
            dist/KriptosferaDemo.exe
            dist/KriptosferaDemo-remote.exe
            dist/payload.zip
            dist/payload.json
            dist/published/**
            dist/README.txt
          if-no-files-found: error

      - name: Attach raw files to GitHub release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          gh release view $tag 2>$null
          if ($LASTEXITCODE -ne 0) {
            gh release create $tag --title $tag --notes "Automated build for $tag"
          }
          gh release upload $tag dist/KriptosferaDemo.exe dist/KriptosferaDemo-remote.exe dist/payload.zip dist/payload.json dist/README.txt --clobber
