name: build-windows

env:
  GOTOOLCHAIN: local
  PAYLOAD_BASE_URL: ${{ vars.KRIPTOSFERA_PAYLOAD_BASE_URL }}

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:

permissions:
  contents: write

jobs:
  payload:
    runs-on: windows-2025-vs2026
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 1

      - name: Restore Chromium runtime cache
        uses: actions/cache@v5
        with:
          path: .build-cache/chromium
          key: chromium-win64-${{ hashFiles('build/chromium-runtime.json') }}

      - name: Build payload package
        shell: pwsh
        run: |
          ./build/build-payload.ps1

      - name: Publish payload to server
        shell: pwsh
        env:
          PAYLOAD_PUBLISH_HOST: ${{ secrets.KRIPTOSFERA_PAYLOAD_PUBLISH_HOST }}
          PAYLOAD_PUBLISH_USER: ${{ secrets.KRIPTOSFERA_PAYLOAD_PUBLISH_USER }}
          PAYLOAD_PUBLISH_PATH: ${{ secrets.KRIPTOSFERA_PAYLOAD_PUBLISH_PATH }}
          PAYLOAD_PUBLISH_KEY: ${{ secrets.KRIPTOSFERA_PAYLOAD_PUBLISH_KEY }}
        run: |
          ./build/deploy-payload.ps1 `
            -PayloadZip dist/payload.zip `
            -PayloadMetadata dist/payload.json `
            -RemoteHost "$env:PAYLOAD_PUBLISH_HOST" `
            -RemoteUser "$env:PAYLOAD_PUBLISH_USER" `
            -RemoteRoot "$env:PAYLOAD_PUBLISH_PATH" `
            -SshPrivateKey "$env:PAYLOAD_PUBLISH_KEY"

      - name: Upload internal payload artifact
        uses: actions/upload-artifact@v6
        with:
          name: kriptosfera-windows-payload-internal
          path: |
            dist/payload.zip
            dist/payload.json
          if-no-files-found: error

      - name: Upload payload workflow artifact
        uses: actions/upload-artifact@v6
        with:
          name: kriptosfera-windows-payload
          path: |
            dist/payload.zip
            dist/payload.json
            dist/README.txt
          if-no-files-found: error

      - name: Attach payload files to GitHub release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          gh release view $tag 2>$null
          if ($LASTEXITCODE -ne 0) {
            gh release create $tag --title $tag --notes "Automated build for $tag"
          }
          gh release upload $tag dist/payload.zip dist/payload.json dist/README.txt --clobber

  launcher:
    needs: payload
    runs-on: windows-2025-vs2026
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 1

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.24'
          cache: true
          cache-dependency-path: go.mod

      - name: Download internal payload artifact
        uses: actions/download-artifact@v6
        with:
          name: kriptosfera-windows-payload-internal
          path: dist

      - name: Build embedded launcher
        shell: pwsh
        run: |
          ./build/build-launcher.ps1 -PayloadMode embedded -PayloadZip dist/payload.zip -PayloadMetadata dist/payload.json

      - name: Build remote launcher
        shell: pwsh
        run: |
          ./build/build-launcher.ps1 -PayloadMode remote -PayloadZip dist/payload.zip -PayloadMetadata dist/payload.json -PayloadBaseUrl "${{ env.PAYLOAD_BASE_URL }}"

      - name: Upload launcher workflow artifact
        uses: actions/upload-artifact@v6
        with:
          name: kriptosfera-windows-launchers
          path: |
            dist/KriptosferaDemo.exe
            dist/KriptosferaDemo-remote.exe
            dist/README.txt
          if-no-files-found: error

      - name: Attach launcher files to GitHub release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          gh release view $tag 2>$null
          if ($LASTEXITCODE -ne 0) {
            gh release create $tag --title $tag --notes "Automated build for $tag"
          }
          gh release upload $tag dist/KriptosferaDemo.exe dist/KriptosferaDemo-remote.exe dist/README.txt --clobber
