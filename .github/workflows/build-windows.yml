name: build-windows

env:
  GOTOOLCHAIN: local
  PAYLOAD_BASE_URL: ${{ vars.KRIPTOSFERA_PAYLOAD_BASE_URL }}

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:

permissions:
  contents: write

jobs:
  launcher:
    runs-on: windows-2025-vs2026
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 1

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.24'
          cache: true
          cache-dependency-path: go.mod

      - name: Download stable payload
        shell: pwsh
        run: |
          ./build/fetch-payload.ps1 -OutputDir dist

      - name: Build embedded launcher
        shell: pwsh
        run: |
          ./build/build-launcher.ps1 -PayloadMode embedded -PayloadZip dist/payload.zip -PayloadMetadata dist/payload.json

      - name: Build remote launcher
        shell: pwsh
        run: |
          ./build/build-launcher.ps1 -PayloadMode remote -PayloadZip dist/payload.zip -PayloadMetadata dist/payload.json -PayloadBaseUrl "${{ env.PAYLOAD_BASE_URL }}"

      - name: Upload launcher workflow artifact
        uses: actions/upload-artifact@v6
        with:
          name: kriptosfera-windows-launchers
          path: |
            dist/KriptosferaDemo.exe
            dist/KriptosferaDemo-remote.exe
            dist/README.txt
          if-no-files-found: error

      - name: Attach launcher files to GitHub release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          gh release view $tag 2>$null
          if ($LASTEXITCODE -ne 0) {
            gh release create $tag --title $tag --notes "Automated build for $tag"
          }
          gh release upload $tag dist/KriptosferaDemo.exe dist/KriptosferaDemo-remote.exe dist/README.txt --clobber
