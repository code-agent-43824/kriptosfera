<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <title>Kriptosfera Diagnostics</title>
  <style>
    body { font-family: system-ui, sans-serif; margin: 24px; line-height: 1.45; }
    h1, h2 { margin-bottom: 0.4em; }
    ul { padding-left: 20px; }
    button, select { margin: 8px 8px 8px 0; padding: 8px 12px; }
    select { min-width: 520px; max-width: 100%; }
    code { background: #f3f3f3; padding: 1px 4px; border-radius: 4px; }
    table { border-collapse: collapse; margin-top: 12px; min-width: 720px; max-width: 100%; }
    th, td { border: 1px solid #ddd; padding: 6px 8px; text-align: left; vertical-align: top; }
    th { background: #f7f7f7; }
    td code { white-space: pre-wrap; word-break: break-word; }
    .ok { color: #0a7a2f; }
    .bad { color: #b00020; }
    .warn { color: #9a5b00; }
    .muted { color: #666; }
  </style>
</head>
<body>
  <h1>Kriptosfera Diagnostics</h1>
  <p>Проверка wiring, CryptoPro extension и полного пути CAdESCOM до открытия хранилища сертификатов.</p>

  <h2>Launcher wiring</h2>
  <div id="launcher-status">Загрузка...</div>

  <h2>Runtime probe</h2>
  <div id="runtime-status">Ожидание...</div>

  <h2>CryptoPro CSP probe</h2>
  <button id="run-csp-probe" type="button" disabled>Run CSP certificate-store probe</button>
  <button id="rerun-csp-probe" type="button" disabled>Run again</button>
  <div id="csp-status">Ожидание...</div>

  <h2>Test signature probe</h2>
  <button id="load-sign-certs" type="button" disabled>Load signing certificates</button>
  <select id="sign-cert-select" disabled>
    <option value="">No certificate loaded</option>
  </select>
  <button id="run-sign-probe" type="button" disabled>Run test signature</button>
  <div id="sign-status">Ожидание...</div>

  <script>window.cadesplugin_load_timeout = 8000;</script>
  <script src="https://www.cryptopro.ru/sites/default/files/products/cades/cadesplugin_api.js?v=313061"></script>
  <script>
    const knownExtension = {
      name: "cryptopro-cades",
      extensionId: "pfhgbfnnjiafkhfdkmpiflachepdcjod",
      version: "1.3.17",
      loadable: true
    };
    const status = window.__KRIPTOSFERA_EXTENSION_STATUS__ || null;
    const launcherEl = document.getElementById("launcher-status");
    const runtimeEl = document.getElementById("runtime-status");
    const cspEl = document.getElementById("csp-status");
    const signEl = document.getElementById("sign-status");
    const runCspButton = document.getElementById("run-csp-probe");
    const rerunCspButton = document.getElementById("rerun-csp-probe");
    const loadSignCertsButton = document.getElementById("load-sign-certs");
    const signCertSelect = document.getElementById("sign-cert-select");
    const runSignButton = document.getElementById("run-sign-probe");
    let runtimeHasAsyncApi = false;
    let signingCertificates = [];

    function esc(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;");
    }

    function row(label, value) {
      return "<li><strong>" + esc(label) + ":</strong> " + value + "</li>";
    }

    function stateLabel(state) {
      if (state === "ok") return "<span class=\"ok\">ok</span>";
      if (state === "warn") return "<span class=\"warn\">warn</span>";
      return "<span class=\"bad\">error</span>";
    }

    function errorText(err) {
      if (!err) return "";
      if (typeof err === "string") return err;
      const parts = [];
      if (err.message) parts.push(err.message);
      if (err.name) parts.push("name=" + err.name);
      if (err.number !== undefined) parts.push("number=" + err.number);
      if (err.requestid !== undefined) parts.push("requestid=" + err.requestid);
      if (err.type) parts.push("type=" + err.type);
      try {
        const json = JSON.stringify(err);
        if (json && json !== "{}") parts.push(json);
      } catch (_) {
        // Ignore non-serializable error details.
      }
      return parts.join(" | ") || String(err);
    }

    function withTimeout(promise, ms, label) {
      return new Promise((resolve, reject) => {
        const timer = setTimeout(() => reject(new Error(label + " timed out after " + ms + "ms")), ms);
        Promise.resolve(promise)
          .then((value) => {
            clearTimeout(timer);
            resolve(value);
          })
          .catch((err) => {
            clearTimeout(timer);
            reject(err);
          });
      });
    }

    async function readValue(value) {
      return await Promise.resolve(value);
    }

    async function readVersionObject(value) {
      const resolved = await readValue(value);
      if (resolved === undefined || resolved === null) return resolved;
      if (typeof resolved === "string") return resolved;
      if (typeof resolved === "number" || typeof resolved === "boolean") return resolved;
      const major = await readValue(resolved.MajorVersion);
      const minor = await readValue(resolved.MinorVersion);
      const build = await readValue(resolved.BuildVersion);
      if (major !== undefined && minor !== undefined && build !== undefined) {
        return String(major) + "." + String(minor) + "." + String(build);
      }
      return JSON.stringify(resolved);
    }

    async function runProbeStep(results, name, fn, timeoutMs) {
      try {
        const value = await withTimeout(fn(), timeoutMs || 6000, name);
        results.push({ name, state: "ok", value: formatValue(value) });
        return value;
      } catch (err) {
        results.push({ name, state: "error", value: errorText(err) });
        return undefined;
      }
    }

    function formatValue(value) {
      if (value === undefined) return "(undefined)";
      if (value === null) return "(null)";
      if (typeof value === "object" && value.objid) return "objid=" + value.objid;
      if (typeof value === "object") {
        try {
          const json = JSON.stringify(value);
          if (json && json !== "{}") return json;
        } catch (_) {
          // Fall through to String(value).
        }
      }
      return String(value);
    }

    function renderProbeResults(results, note) {
      const rows = results.map((item) =>
        "<tr>" +
          "<td><code>" + esc(item.name) + "</code></td>" +
          "<td>" + stateLabel(item.state) + "</td>" +
          "<td><code>" + esc(item.value) + "</code></td>" +
        "</tr>"
      ).join("");
      return (note ? "<p class=\"muted\">" + esc(note) + "</p>" : "") +
        "<table>" +
          "<thead><tr><th>Probe</th><th>Status</th><th>Value / error</th></tr></thead>" +
          "<tbody>" + rows + "</tbody>" +
        "</table>";
    }

    async function getProperty(object, propertyName) {
      if (!object) return undefined;
      return await readValue(object[propertyName]);
    }

    async function callOptionalMethod(object, methodName, args) {
      if (!object || typeof object[methodName] !== "function") {
        return "(" + methodName + " unavailable)";
      }
      return await readValue(await object[methodName].apply(object, args || []));
    }

    async function callRequiredMethod(object, methodName, args) {
      if (!object || typeof object[methodName] !== "function") {
        throw new Error(methodName + " unavailable");
      }
      return await readValue(await object[methodName].apply(object, args || []));
    }

    async function getPropertyOrCall(object, propertyName) {
      const value = await getProperty(object, propertyName);
      if (typeof value === "function") {
        return await readValue(await value.call(object));
      }
      return value;
    }

    async function readCertificateDetails(results, certificates, index) {
      const prefix = "Certificates.Item(" + index + ")";
      const certificate = await runProbeStep(results, prefix, async () => callOptionalMethod(certificates, "Item", [index]), 10000);
      if (!certificate) return;

      await runProbeStep(results, prefix + ".SubjectName", async () => getProperty(certificate, "SubjectName"), 10000);
      await runProbeStep(results, prefix + ".IssuerName", async () => getProperty(certificate, "IssuerName"), 10000);
      await runProbeStep(results, prefix + ".SerialNumber", async () => getProperty(certificate, "SerialNumber"), 10000);
      await runProbeStep(results, prefix + ".Thumbprint", async () => getProperty(certificate, "Thumbprint"), 10000);
      await runProbeStep(results, prefix + ".ValidFromDate", async () => getProperty(certificate, "ValidFromDate"), 10000);
      await runProbeStep(results, prefix + ".ValidToDate", async () => getProperty(certificate, "ValidToDate"), 10000);
      await runProbeStep(results, prefix + ".HasPrivateKey", async () => getPropertyOrCall(certificate, "HasPrivateKey"), 10000);

      const privateKey = await runProbeStep(results, prefix + ".PrivateKey", async () => getProperty(certificate, "PrivateKey"), 10000);
      if (!privateKey) return;

      for (const propertyName of ["ProviderName", "ProviderType", "ContainerName", "UniqueContainerName", "KeySpec"]) {
        await runProbeStep(results, prefix + ".PrivateKey." + propertyName, async () => getProperty(privateKey, propertyName), 10000);
      }
    }

    function shortText(value, maxLength) {
      const text = String(value || "");
      if (text.length <= maxLength) return text;
      return text.slice(0, maxLength - 1) + "...";
    }

    function renderSigningCertificateOptions() {
      const options = signingCertificates.map((item) => {
        const label = "#" + item.index + " " + shortText(item.subject, 80) + " [" + item.thumbprint + "]";
        return "<option value=\"" + esc(item.thumbprint) + "\">" + esc(label) + "</option>";
      }).join("");
      signCertSelect.innerHTML = options || "<option value=\"\">No private-key certificate found</option>";
      signCertSelect.disabled = signingCertificates.length === 0;
      runSignButton.disabled = !runtimeHasAsyncApi || signingCertificates.length === 0;
    }

    function renderLauncherStatus() {
      if (!status) {
        launcherEl.innerHTML =
          "<p class=\"muted\">Launcher status file недоступен на публичной diagnostics page; используется стабильный extension id из manifest.key.</p>" +
          "<ul>" +
            row("primaryExtension", "<code>" + esc(knownExtension.name) + "</code>") +
            row("extensionVersion", "<code>" + esc(knownExtension.version) + "</code>") +
            row("extensionId", "<code>" + esc(knownExtension.extensionId) + "</code>") +
          "</ul>";
        return knownExtension;
      }
      const extensions = Array.isArray(status.extensions) ? status.extensions : [];
      const primary = extensions.find((item) => item.name === "cryptopro-cades") || extensions[0] || null;
      launcherEl.innerHTML =
        "<ul>" +
          row("generatedAt", "<code>" + esc(status.generatedAt || "unknown") + "</code>") +
          row("extensionsRoot", "<code>" + esc(status.extensionsRoot || "unknown") + "</code>") +
          row("detectedCount", esc(status.detectedCount ?? "0")) +
          row("loadableCount", esc(status.loadableCount ?? "0")) +
          row("chromiumArgsAdded", status.chromiumArgsAdded ? "<span class=\"ok\">yes</span>" : "<span class=\"bad\">no</span>") +
          (primary ? row("primaryExtension", "<code>" + esc(primary.name) + "</code>") : row("primaryExtension", "<span class=\"bad\">not found</span>")) +
          (primary ? row("extensionVersion", "<code>" + esc(primary.version || "unknown") + "</code>") : "") +
          (primary ? row("extensionId", "<code>" + esc(primary.extensionId || "unknown") + "</code>") : "") +
          (primary && primary.manifestError ? row("manifestError", "<span class=\"bad\">" + esc(primary.manifestError) + "</span>") : "") +
        "</ul>";
      return primary;
    }

    function callbackProbe(start, ms, label) {
      return new Promise((resolve, reject) => {
        let done = false;
        const timer = setTimeout(() => {
          if (!done) {
            done = true;
            reject(new Error(label + " timed out after " + ms + "ms"));
          }
        }, ms);
        start((value) => {
          if (!done) {
            done = true;
            clearTimeout(timer);
            resolve(value);
          }
        });
      });
    }

    async function renderRuntimeStatus(primary) {
      if (!primary || !primary.extensionId) {
        runtimeEl.innerHTML = "<p class=\"bad\">Нет extension id для runtime probe.</p>";
        cspEl.innerHTML = "<p class=\"bad\">CSP probe пропущен.</p>";
        signEl.innerHTML = "<p class=\"bad\">Signature probe пропущен.</p>";
        return;
      }
      const results = [];
      await runProbeStep(results, "cadesplugin_api.js", async () =>
        typeof window.cadesplugin === "undefined" ? Promise.reject(new Error("cadesplugin global missing")) : "loaded"
      );
      await runProbeStep(results, "extension version response", async () =>
        callbackProbe((done) => window.cadesplugin.get_extension_version(done), 3000, "extension version response")
      );
      const hasAsyncApi = !!(window.cadesplugin && typeof window.cadesplugin.CreateObjectAsync === "function");
      runtimeHasAsyncApi = hasAsyncApi;
      runtimeEl.innerHTML =
        renderProbeResults(results, "Runtime probe использует официальный cadesplugin_api.js, как демо-страница CryptoPro.") +
        "<ul>" + row("cadesplugin.CreateObjectAsync", hasAsyncApi ? "<span class=\"ok\">present</span>" : "<span class=\"bad\">missing</span>") + "</ul>";
      renderCspStatusIntro(hasAsyncApi);
    }

    function renderCspStatusIntro(hasAsyncApi) {
      if (!hasAsyncApi) {
        cspEl.innerHTML = "<p class=\"bad\">CryptoPro extension API недоступен, CSP probe пропущен.</p>";
        return;
      }
      runCspButton.disabled = false;
      rerunCspButton.disabled = false;
      cspEl.innerHTML =
        "<p class=\"muted\">Нажмите кнопку CSP certificate-store probe. Запуск идёт из пользовательского действия, чтобы системное окно разрешения CryptoPro/CSP могло появиться в этой же вкладке.</p>";
      loadSignCertsButton.disabled = false;
      renderSigningCertificateOptions();
      signEl.innerHTML =
        "<p class=\"muted\">Нажмите Load signing certificates, выберите сертификат, затем Run test signature.</p>";
    }

    async function renderCspStatus() {
      if (!runtimeHasAsyncApi) {
        cspEl.innerHTML = "<p class=\"bad\">CryptoPro extension API недоступен, CSP probe пропущен.</p>";
        return;
      }
      runCspButton.disabled = true;
      rerunCspButton.disabled = true;
      cspEl.innerHTML = "<p class=\"muted\">Выполняется полный CAdESCOM/CSP сценарий: About, provider types, Store.Open, Certificates.Count...</p>";
      const results = [];
      await runProbeStep(results, "cadesplugin ready", async () => {
        await withTimeout(window.cadesplugin, 15000, "cadesplugin ready");
        return "ready";
      }, 16000);
      if (results[results.length - 1].state !== "ok") {
        cspEl.innerHTML = renderProbeResults(results, "Native host или Browser Plugin object недоступен.");
        runCspButton.disabled = false;
        rerunCspButton.disabled = false;
        return;
      }

      const about = await runProbeStep(results, "CreateObjectAsync(\"CAdESCOM.About\")", async () => {
        return await window.cadesplugin.CreateObjectAsync("CAdESCOM.About");
      }, 10000);
      if (!about) {
        cspEl.innerHTML = renderProbeResults(results, "CAdESCOM.About не создан; дальше version/CSP calls невозможны.");
        runCspButton.disabled = false;
        rerunCspButton.disabled = false;
        return;
      }

      await runProbeStep(results, "About.PluginVersion", async () => readVersionObject(about.PluginVersion));
      await runProbeStep(results, "About.Version", async () => readVersionObject(about.Version));
      for (const providerType of [75, 80, 81]) {
        await runProbeStep(results, "About.CSPName(" + providerType + ")", async () => readValue(await about.CSPName(providerType)));
        await runProbeStep(results, "About.CSPVersion(\"\", " + providerType + ")", async () => readVersionObject(await about.CSPVersion("", providerType)));
      }
      await runProbeStep(results, "cadesplugin.EnableInternalCSP", async () => {
        if (typeof window.cadesplugin === "undefined") return "(cadesplugin global undefined)";
        return window.cadesplugin.EnableInternalCSP;
      });

      const store = await runProbeStep(results, "CreateObjectAsync(\"CAdESCOM.Store\")", async () => {
        return await window.cadesplugin.CreateObjectAsync("CAdESCOM.Store");
      }, 10000);
      if (!store) {
        cspEl.innerHTML = renderProbeResults(results, "CAdESCOM.Store не создан; certificate-store flow дальше невозможен.");
        runCspButton.disabled = false;
        rerunCspButton.disabled = false;
        return;
      }

      await runProbeStep(results, "Store.Open(2, \"My\", 2)", async () => {
        await store.Open(2, "My", 2);
        return "opened";
      }, 30000);

      const certificates = await runProbeStep(results, "Store.Certificates", async () => getProperty(store, "Certificates"), 10000);
      const certificateCount = await runProbeStep(results, "Certificates.Count", async () => getProperty(certificates, "Count"), 10000);
      const numericCount = Number(certificateCount);
      if (Number.isFinite(numericCount) && numericCount > 0) {
        const limit = Math.min(numericCount, 10);
        await runProbeStep(results, "Certificates detail limit", async () => limit + " of " + numericCount);
        for (let index = 1; index <= limit; index += 1) {
          await readCertificateDetails(results, certificates, index);
        }
      }
      await runProbeStep(results, "Store.Close()", async () => callOptionalMethod(store, "Close", []), 6000);

      cspEl.innerHTML = renderProbeResults(results, "Этот сценарий должен выполняться в той же вкладке, где подтверждается системное разрешение CryptoPro/CSP. После него можно сразу снимать modules JSON для nmcades.exe.");
      runCspButton.disabled = false;
      rerunCspButton.disabled = false;
    }

    async function loadSigningCertificates() {
      if (!runtimeHasAsyncApi) {
        signEl.innerHTML = "<p class=\"bad\">CryptoPro extension API недоступен, certificate loading пропущен.</p>";
        return;
      }
      loadSignCertsButton.disabled = true;
      runSignButton.disabled = true;
      signEl.innerHTML = "<p class=\"muted\">Загружается список сертификатов с приватным ключом...</p>";
      const results = [];
      const found = [];

      await runProbeStep(results, "cadesplugin ready", async () => {
        await withTimeout(window.cadesplugin, 15000, "cadesplugin ready");
        return "ready";
      }, 16000);
      if (results[results.length - 1].state !== "ok") {
        signingCertificates = [];
        renderSigningCertificateOptions();
        signEl.innerHTML = renderProbeResults(results, "Native host или Browser Plugin object недоступен.");
        loadSignCertsButton.disabled = false;
        return;
      }

      const store = await runProbeStep(results, "CreateObjectAsync(\"CAdESCOM.Store\")", async () => {
        return await window.cadesplugin.CreateObjectAsync("CAdESCOM.Store");
      }, 10000);
      if (!store) {
        signingCertificates = [];
        renderSigningCertificateOptions();
        signEl.innerHTML = renderProbeResults(results, "CAdESCOM.Store не создан.");
        loadSignCertsButton.disabled = false;
        return;
      }

      await runProbeStep(results, "Store.Open(2, \"My\", 2)", async () => {
        await store.Open(2, "My", 2);
        return "opened";
      }, 30000);
      const certificates = await runProbeStep(results, "Store.Certificates", async () => getProperty(store, "Certificates"), 10000);
      const certificateCount = await runProbeStep(results, "Certificates.Count", async () => getProperty(certificates, "Count"), 10000);
      const numericCount = Number(certificateCount);

      if (Number.isFinite(numericCount) && numericCount > 0) {
        for (let index = 1; index <= numericCount; index += 1) {
          const certificate = await runProbeStep(results, "Certificates.Item(" + index + ")", async () => callRequiredMethod(certificates, "Item", [index]), 10000);
          if (!certificate) continue;
          const subject = await runProbeStep(results, "Certificates.Item(" + index + ").SubjectName", async () => getProperty(certificate, "SubjectName"), 10000);
          const thumbprint = await runProbeStep(results, "Certificates.Item(" + index + ").Thumbprint", async () => getProperty(certificate, "Thumbprint"), 10000);
          const hasPrivateKey = await runProbeStep(results, "Certificates.Item(" + index + ").HasPrivateKey", async () => getPropertyOrCall(certificate, "HasPrivateKey"), 10000);
          if ((hasPrivateKey === true || String(hasPrivateKey).toLowerCase() === "true") && thumbprint) {
            found.push({ index, subject: String(subject || ""), thumbprint: String(thumbprint) });
          }
        }
      }

      await runProbeStep(results, "Store.Close()", async () => callOptionalMethod(store, "Close", []), 6000);
      signingCertificates = found;
      renderSigningCertificateOptions();
      signEl.innerHTML = renderProbeResults(results, "Выберите сертификат в списке над кнопкой Run test signature.");
      loadSignCertsButton.disabled = false;
    }

    async function findSelectedCertificateWithPrivateKey(results, store) {
      await runProbeStep(results, "Store.Open(2, \"My\", 2)", async () => {
        await store.Open(2, "My", 2);
        return "opened";
      }, 30000);

      const certificates = await runProbeStep(results, "Store.Certificates", async () => getProperty(store, "Certificates"), 10000);
      const certificateCount = await runProbeStep(results, "Certificates.Count", async () => getProperty(certificates, "Count"), 10000);
      const numericCount = Number(certificateCount);
      if (!Number.isFinite(numericCount) || numericCount < 1) return null;
      const selectedThumbprint = signCertSelect.value;
      await runProbeStep(results, "selected thumbprint", async () => selectedThumbprint || "(first private-key certificate)");

      for (let index = 1; index <= numericCount; index += 1) {
        const certificate = await runProbeStep(results, "Certificates.Item(" + index + ")", async () => callRequiredMethod(certificates, "Item", [index]), 10000);
        if (!certificate) continue;
        const subject = await runProbeStep(results, "Certificates.Item(" + index + ").SubjectName", async () => getProperty(certificate, "SubjectName"), 10000);
        const thumbprint = await runProbeStep(results, "Certificates.Item(" + index + ").Thumbprint", async () => getProperty(certificate, "Thumbprint"), 10000);
        const hasPrivateKey = await runProbeStep(results, "Certificates.Item(" + index + ").HasPrivateKey", async () => getPropertyOrCall(certificate, "HasPrivateKey"), 10000);
        const thumbprintMatches = !selectedThumbprint || String(thumbprint).toUpperCase() === selectedThumbprint.toUpperCase();
        if (thumbprintMatches && (hasPrivateKey === true || String(hasPrivateKey).toLowerCase() === "true")) {
          await runProbeStep(results, "selected certificate", async () => String(subject || "(no subject)") + " / " + String(thumbprint || "(no thumbprint)"));
          return certificate;
        }
      }
      return null;
    }

    async function renderSignStatus() {
      if (!runtimeHasAsyncApi) {
        signEl.innerHTML = "<p class=\"bad\">CryptoPro extension API недоступен, signature probe пропущен.</p>";
        return;
      }
      runSignButton.disabled = true;
      signEl.innerHTML = "<p class=\"muted\">Выполняется тестовая CAdES подпись короткой строки...</p>";
      const results = [];

      await runProbeStep(results, "cadesplugin ready", async () => {
        await withTimeout(window.cadesplugin, 15000, "cadesplugin ready");
        return "ready";
      }, 16000);
      if (results[results.length - 1].state !== "ok") {
        signEl.innerHTML = renderProbeResults(results, "Native host или Browser Plugin object недоступен.");
        runSignButton.disabled = false;
        return;
      }

      const store = await runProbeStep(results, "CreateObjectAsync(\"CAdESCOM.Store\")", async () => {
        return await window.cadesplugin.CreateObjectAsync("CAdESCOM.Store");
      }, 10000);
      if (!store) {
        signEl.innerHTML = renderProbeResults(results, "CAdESCOM.Store не создан; signature flow невозможен.");
        runSignButton.disabled = false;
        return;
      }

      const certificate = await findSelectedCertificateWithPrivateKey(results, store);
      if (!certificate) {
        await runProbeStep(results, "Store.Close()", async () => callOptionalMethod(store, "Close", []), 6000);
        signEl.innerHTML = renderProbeResults(results, "Сертификат с приватным ключом не найден.");
        runSignButton.disabled = false;
        return;
      }

      const signer = await runProbeStep(results, "CreateObjectAsync(\"CAdESCOM.CPSigner\")", async () => {
        return await window.cadesplugin.CreateObjectAsync("CAdESCOM.CPSigner");
      }, 10000);
      if (!signer) {
        await runProbeStep(results, "Store.Close()", async () => callOptionalMethod(store, "Close", []), 6000);
        signEl.innerHTML = renderProbeResults(results, "CAdESCOM.CPSigner не создан.");
        runSignButton.disabled = false;
        return;
      }

      await runProbeStep(results, "CPSigner.propset_Certificate", async () => callRequiredMethod(signer, "propset_Certificate", [certificate]), 10000);
      await runProbeStep(results, "CPSigner.propset_CheckCertificate(false)", async () => callRequiredMethod(signer, "propset_CheckCertificate", [false]), 10000);
      await runProbeStep(results, "CPSigner.propset_Options(2)", async () => callRequiredMethod(signer, "propset_Options", [2]), 10000);

      const signedData = await runProbeStep(results, "CreateObjectAsync(\"CAdESCOM.CadesSignedData\")", async () => {
        return await window.cadesplugin.CreateObjectAsync("CAdESCOM.CadesSignedData");
      }, 10000);
      if (!signedData) {
        await runProbeStep(results, "Store.Close()", async () => callOptionalMethod(store, "Close", []), 6000);
        signEl.innerHTML = renderProbeResults(results, "CAdESCOM.CadesSignedData не создан.");
        runSignButton.disabled = false;
        return;
      }

      const content = "Kriptosfera diagnostics test";
      await runProbeStep(results, "CadesSignedData.propset_Content", async () => callRequiredMethod(signedData, "propset_Content", [content]), 10000);
      const signature = await runProbeStep(results, "CadesSignedData.SignCades(CADES_BES, detached, end-entity-only)", async () => {
        return await callRequiredMethod(signedData, "SignCades", [signer, 1, true]);
      }, 60000);
      if (typeof signature === "string") {
        await runProbeStep(results, "Signature length", async () => signature.length);
        await runProbeStep(results, "Signature prefix", async () => signature.slice(0, 80));
      }
      await runProbeStep(results, "Store.Close()", async () => callOptionalMethod(store, "Close", []), 6000);

      signEl.innerHTML = renderProbeResults(results, "Этот тест проверяет реальную криптооперацию через выбранный сертификат, а не только видимость ключа.");
      runSignButton.disabled = false;
    }

    const primary = renderLauncherStatus();
    renderRuntimeStatus(primary);
    runCspButton.addEventListener("click", renderCspStatus);
    rerunCspButton.addEventListener("click", renderCspStatus);
    loadSignCertsButton.addEventListener("click", loadSigningCertificates);
    runSignButton.addEventListener("click", renderSignStatus);
  </script>
</body>
</html>
